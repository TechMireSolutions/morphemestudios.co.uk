# Security headers for responses Nginx serves directly (SPA HTML, static assets,
# public media). Install to /etc/nginx/snippets/morpheme-security-headers.conf
# and `include` it in each served location (see nginx-morphemestudios.conf).
#
# NOTE: the proxied /api and /admin responses already receive HSTS / CSP /
# nosniff / frame-deny from Django (SecurityMiddleware + django-csp), so this
# snippet is intentionally NOT included there to avoid duplicate/ conflicting CSP.
#
# `always` ensures headers are sent even on error responses.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
