# Nginx site for Morpheme Studios (single VPS).
# - Serves the prerendered/static Vite build (the SPA).
# - Proxies API/admin/sitemap/robots to gunicorn on 127.0.0.1:8000.
# - Serves public media directly; streams private files via X-Accel-Redirect.
# Install to /etc/nginx/sites-available/morphemestudios and symlink to
# sites-enabled, then add TLS with: certbot --nginx -d morphemestudios.com -d www.morphemestudios.com
#
# Layout assumed:
#   /srv/morpheme/frontend/dist     <- `npm run build` output
#   /srv/morpheme/backend/media     <- public uploads
#   /srv/morpheme/backend/private-media <- private uploads (never public)
#   /srv/morpheme/backend/staticfiles  <- collectstatic output (Django admin assets)

server {
    listen 80;
    server_name morphemestudios.com www.morphemestudios.com;

    root /srv/morpheme/frontend/dist;
    index index.html;

    client_max_body_size 12M;   # allow 10MB uploads + overhead
    server_tokens off;          # don't leak the Nginx version

    # Compression for text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # --- Django-served paths ---
    location ~ ^/(api|admin)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /sitemap.xml { proxy_pass http://127.0.0.1:8000; }
    location = /robots.txt  { proxy_pass http://127.0.0.1:8000; }

    # Health/readiness probes -> Django (exact-match beats the SPA `location /`,
    # so they are never shadowed by index.html). For uptime monitors.
    location = /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }
    location = /ready {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Public signed download endpoint -> Django (issues X-Accel-Redirect).
    location /protected/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # INTERNAL: actual private files, only reachable via X-Accel-Redirect.
    location /_protected/ {
        internal;
        alias /srv/morpheme/backend/private-media/;
    }

    # Django static (admin) + public media. (security headers + nosniff)
    location /static/ {
        alias /srv/morpheme/backend/staticfiles/;
        expires 30d;
        include snippets/morpheme-security-headers.conf;
    }
    location /media/ {
        alias /srv/morpheme/backend/media/;
        expires 7d;
        include snippets/morpheme-security-headers.conf;
    }

    # Hashed SPA assets — long cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include snippets/morpheme-security-headers.conf;
        try_files $uri =404;
    }

    # SPA deep-link fallback (the main user-facing HTML — must carry headers).
    location / {
        include snippets/morpheme-security-headers.conf;
        try_files $uri $uri.html $uri/ /index.html;
    }
}
